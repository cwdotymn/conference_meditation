{% extends "base.html" %}
{% block title %}New Session — Conference Meditation{% endblock %}
{% block content %}
<div class="setup-page">
  <h2 class="page-title">New Session</h2>

  <form method="POST" action="{{ url_for('new_session') }}" id="sessionForm">

    <!-- Topic -->
    <section class="setup-section">
      <label class="setup-label">Topic</label>
      <div class="topic-grid" id="topicGrid">
        {% for topic in topics %}
        <label class="topic-card">
          <input type="radio" name="topic_id" value="{{ topic.id }}"
            {% if loop.first %}checked{% endif %}
            onchange="onTopicChange({{ topic.id }}, '{{ topic.name }}', '{{ topic.search_query }}')">
          <span class="topic-card-name">{{ topic.name }}</span>
        </label>
        {% endfor %}
      </div>
    </section>

    <!-- Timer (collapsed by default) -->
    <section class="setup-section">
      <div class="setup-label-row">
        <label class="setup-label">Timer</label>
        <button type="button" class="setup-adjust" id="timerToggle" onclick="toggleTimer()">adjust</button>
      </div>
      <p class="timer-summary" id="timerSummary"></p>
      <div class="timer-config" id="timerConfig" style="display:none; margin-top:1rem">
        <div class="timer-field">
          <label class="timer-label">Work</label>
          <div class="timer-input-wrap">
            <input type="number" name="work_minutes" id="workMin" value="25" min="1" max="120" class="timer-input">
            <span class="timer-unit">min</span>
          </div>
        </div>
        <div class="timer-divider">×</div>
        <div class="timer-field">
          <label class="timer-label">Rounds</label>
          <div class="timer-input-wrap">
            <input type="number" name="rounds" id="rounds" value="4" min="1" max="12" class="timer-input">
          </div>
        </div>
        <div class="timer-divider">+</div>
        <div class="timer-field">
          <label class="timer-label">Break</label>
          <div class="timer-input-wrap">
            <input type="number" name="break_minutes" id="breakMin" value="5" min="1" max="30" class="timer-input">
            <span class="timer-unit">min</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Video -->
    <section class="setup-section">
      <div class="setup-label-row">
        <label class="setup-label">Video</label>
        <span class="setup-optional">optional</span>
      </div>

      <div class="search-row">
        <input type="text" id="ytQuery" class="search-input" placeholder="search YouTube...">
        <button type="button" class="btn btn-sm" onclick="searchYT()">Search</button>
      </div>
      <p class="api-hint" id="apiHint"></p>
      <div class="video-list" id="searchResults"></div>

      <div id="pinnedSection" style="margin-top:0.75rem">
        <p class="subsection-label" id="pinnedLabel">pinned</p>
        <div class="video-list" id="pinnedList">
          <p class="empty-hint">Loading...</p>
        </div>
      </div>

      <input type="hidden" name="video_id" id="selectedVideoId">
      <input type="hidden" name="video_title" id="selectedVideoTitle">

      <div class="selected-video" id="selectedPreview" style="display:none">
        <span class="selected-label">Selected:</span>
        <span id="selectedName" class="selected-name"></span>
        <button type="button" class="clear-btn" onclick="clearVideo()">✕</button>
      </div>
    </section>

    <div class="setup-footer">
      <button type="submit" class="btn btn-primary btn-lg">Enter Focus Chamber →</button>
    </div>

  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  let currentTopicId = {{ topics[0].id if topics else 'null' }};
  let currentSearchQuery = '{{ topics[0].search_query if topics else "" }}';
  let timerOpen = false;

  const preTopicId = new URLSearchParams(window.location.search).get('topic_id');

  function onTopicChange(id, name, query) {
    currentTopicId = id;
    currentSearchQuery = query;
    document.getElementById('ytQuery').placeholder = `search: ${name}`;
    loadPins(id);
  }

  function toggleTimer() {
    timerOpen = !timerOpen;
    document.getElementById('timerConfig').style.display = timerOpen ? 'flex' : 'none';
    document.getElementById('timerToggle').textContent = timerOpen ? 'done' : 'adjust';
  }

  function loadPins(topicId) {
    fetch(`/api/topics/${topicId}/pins`)
      .then(r => r.json())
      .then(pins => {
        const el = document.getElementById('pinnedList');
        const label = document.getElementById('pinnedLabel');
        if (pins.length === 0) {
          el.innerHTML = '<p class="empty-hint">No pinned videos for this topic.</p>';
          label.style.display = 'none';
        } else {
          label.style.display = '';
          el.innerHTML = pins.map(p => videoCard(p.video_id, p.title, '', p.id, true)).join('');
        }
      });
  }

  function searchYT() {
    const q = document.getElementById('ytQuery').value.trim() || currentSearchQuery;
    const hint = document.getElementById('apiHint');
    const results = document.getElementById('searchResults');
    results.innerHTML = '<p class="empty-hint">Searching...</p>';
    fetch(`/api/youtube/search?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          hint.textContent = data.error.includes('No YouTube API key')
            ? 'Set YOUTUBE_API_KEY to enable search. Use pinned videos in the meantime.'
            : `Error: ${data.error}`;
          results.innerHTML = '';
          return;
        }
        hint.textContent = '';
        results.innerHTML = data.items.length
          ? data.items.map(v => videoCard(v.video_id, v.title, v.channel)).join('')
          : '<p class="empty-hint">No results.</p>';
      });
  }

  function videoCard(videoId, title, channel, pinId = null, isPinned = false) {
    const thumb = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
    const safeTitle = title.replace(/`/g, '');
    const pinBtn = isPinned
      ? `<button type="button" class="card-action" onclick="unpin(${pinId}, event)">unpin</button>`
      : `<button type="button" class="card-action" onclick="pinFromSearch('${videoId}', \`${safeTitle}\`, event)">pin</button>`;
    return `
      <div class="video-card" onclick="selectVideo('${videoId}', \`${safeTitle}\`)" data-vid="${videoId}">
        <img src="${thumb}" class="video-thumb" alt="">
        <div class="video-info">
          <p class="video-title">${title}</p>
          ${channel ? `<p class="video-channel">${channel}</p>` : ''}
        </div>
        ${pinBtn}
      </div>`;
  }

  function selectVideo(videoId, title) {
    document.getElementById('selectedVideoId').value = videoId;
    document.getElementById('selectedVideoTitle').value = title;
    document.getElementById('selectedName').textContent = title;
    document.getElementById('selectedPreview').style.display = 'flex';
    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll(`[data-vid="${videoId}"]`).forEach(c => c.classList.add('selected'));
  }

  function clearVideo() {
    document.getElementById('selectedVideoId').value = '';
    document.getElementById('selectedVideoTitle').value = '';
    document.getElementById('selectedPreview').style.display = 'none';
    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('selected'));
  }

  function pinFromSearch(videoId, title, evt) {
    evt.stopPropagation();
    fetch(`/api/topics/${currentTopicId}/pins`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: `https://www.youtube.com/watch?v=${videoId}`, title })
    }).then(() => loadPins(currentTopicId));
  }

  function unpin(pinId, evt) {
    evt.stopPropagation();
    fetch(`/api/pins/${pinId}`, { method: 'DELETE' })
      .then(() => loadPins(currentTopicId));
  }

  function updateTimerSummary() {
    const work = parseInt(document.getElementById('workMin').value) || 25;
    const brk = parseInt(document.getElementById('breakMin').value) || 5;
    const rounds = parseInt(document.getElementById('rounds').value) || 4;
    const total = (work * rounds) + (brk * (rounds - 1));
    const h = Math.floor(total / 60);
    const m = total % 60;
    const totalStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
    document.getElementById('timerSummary').textContent =
      `${rounds} × ${work} min work + ${brk} min break = ${totalStr}`;
  }

  document.getElementById('workMin').addEventListener('input', updateTimerSummary);
  document.getElementById('breakMin').addEventListener('input', updateTimerSummary);
  document.getElementById('rounds').addEventListener('input', updateTimerSummary);

  document.getElementById('ytQuery').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); searchYT(); }
  });

  window.addEventListener('DOMContentLoaded', () => {
    updateTimerSummary();

    if (preTopicId) {
      const radio = document.querySelector(`input[name="topic_id"][value="${preTopicId}"]`);
      if (radio) {
        radio.checked = true;
        currentTopicId = parseInt(preTopicId);
        const label = radio.closest('.topic-card').querySelector('.topic-card-name');
        currentSearchQuery = radio.closest('.topic-card')
          .querySelector('input').getAttribute('onchange').match(/'([^']+)'\s*\)$/)?.[1] || '';
      }
    }

    loadPins(currentTopicId);
  });
</script>
{% endblock %}
